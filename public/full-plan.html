<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRANDON · NO DAYS OFF — The Game Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* BRAND PALETTE — restrained */
  --bg:#13112e;            /* deep indigo */
  --bg2:#1a1840;           /* one notch lighter */
  --card:#1e1c47;          /* card surface */
  --card2:#262358;         /* elevated card */
  --border:#2e2b5e;        /* subtle border */
  --border-lt:#3a3778;     /* hover border */
  --text:#ede9e0;          /* cream — primary text */
  --dim:#a09ccc;           /* secondary text */
  --muted:#6864a0;         /* tertiary text */
  --orange:#ff4e1b;        /* PRIMARY ACCENT */
  --orange2:#ff6a37;
  --orange-soft:rgba(255,78,27,.12);
  --cream:#ede9e0;
  --indigo:#3a3778;
  --indigo2:#5d58c7;       /* lifted for gradients */
  --red:#ff3b2d;
  --green:#6de0c5;
  --blush:#ff8a7a;         /* gradient companion to orange */
  --grad-brand:linear-gradient(135deg,#ff4e1b 0%,#ff8a7a 100%);
  --grad-bloom:radial-gradient(ellipse 80% 60% at 85% 0%,rgba(255,78,27,.18) 0%,transparent 55%),radial-gradient(ellipse 70% 60% at 0% 25%,rgba(93,88,199,.16) 0%,transparent 55%);
  --grad-hero:radial-gradient(circle at 80% 20%,rgba(255,78,27,.32) 0%,transparent 50%),radial-gradient(circle at 15% 85%,rgba(93,88,199,.4) 0%,transparent 55%),linear-gradient(135deg,#1c1945 0%,#252352 60%,#2e2466 100%);
  /* Aliases for legacy refs so nothing breaks — all map to neutral/primary */
  --indigo-lt:#6864a0;     /* → muted (no longer a distinct color) */
  --blue:#6864a0;
  --pink:#ff8a7a;
  --yellow:#ff8a7a;
  --purple:#6864a0;
  --teal:#6de0c5;
  --volt:#ff4e1b;
  --display:"Archivo Black","Inter Black","Bebas Neue",-apple-system,sans-serif;
  --condensed:"Bebas Neue","Archivo Black",-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
body{background:var(--grad-bloom),#13112e;background-attachment:fixed}
a{color:var(--orange);text-decoration:none;font-weight:700}
a:hover{color:var(--orange2);text-decoration:underline}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ACCENT BAR — orange to indigo gradient fade */
.swoosh-line{height:2px;background:linear-gradient(90deg,var(--orange) 0%,var(--orange) 45%,var(--indigo2) 100%);margin-bottom:0}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(19,17,46,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:64px;gap:12px}
.logo{font-family:var(--display);font-weight:900;font-size:20px;letter-spacing:.5px;white-space:nowrap;text-transform:uppercase;font-style:italic;transform:skewX(-6deg);color:var(--cream)}
.logo span{color:var(--orange)}
.logo::before{content:"";display:inline-block;width:24px;height:10px;background:var(--orange);clip-path:polygon(0 100%,100% 0,100% 30%,15% 100%);margin-right:8px;vertical-align:middle;transform:skewX(6deg)}
.nav-links{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-links button{background:transparent;border:none;color:var(--dim);padding:10px 14px;border-radius:0;font-size:12px;font-weight:800;white-space:nowrap;transition:all .15s;text-transform:uppercase;letter-spacing:1.2px;border-bottom:2px solid transparent}
.nav-links button:hover{color:var(--cream)}
.nav-links button.active{color:var(--orange);border-bottom-color:var(--orange)}

main{max-width:1280px;margin:0 auto;padding:28px 20px 80px}
.section{display:none;animation:fade .35s}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

h1,h2,h3,h4{font-weight:900;letter-spacing:-.5px;text-transform:uppercase;font-family:var(--display)}
h1{font-size:52px;margin-bottom:6px;font-style:italic;line-height:.95;letter-spacing:-1.5px}
h2{font-size:26px;margin-bottom:14px;font-style:italic;letter-spacing:-.8px}
h3{font-size:17px;margin-bottom:10px;letter-spacing:-.3px}
h4{font-size:13px;margin-bottom:6px;letter-spacing:2px;color:var(--orange);font-family:var(--display)}
.sub{color:var(--dim);font-size:14px;margin-bottom:20px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px}
.muted{color:var(--muted)}

.card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:26px;margin-bottom:18px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;width:4px;height:0;background:var(--orange);transition:height .3s}
.card:hover::before{height:100%}
.card.tight{padding:18px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}

/* HERO — editorial gradient bloom */
.hero{background:var(--grad-hero);border:1px solid var(--border);border-radius:4px;padding:48px 36px;margin-bottom:22px;position:relative;border-left:4px solid var(--orange);overflow:hidden}
.hero h1{font-size:72px;line-height:.9;letter-spacing:-3px;color:var(--cream);position:relative;z-index:2}
.hero h1 span{color:var(--orange);display:inline-block}
.tagline{color:var(--cream);opacity:.85;margin-top:16px;font-size:12px;text-transform:uppercase;letter-spacing:2px;font-weight:700;position:relative;z-index:2}

/* STAT TILE — clean, quiet unless emphasized */
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:18px;position:relative;transition:border-color .15s;overflow:hidden}
.stat-tile:hover{border-color:var(--border-lt)}
.stat-tile .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:800;font-family:var(--display);position:relative;z-index:2}
.stat-tile .val{font-size:32px;font-weight:900;line-height:1;font-family:var(--display);font-style:italic;letter-spacing:-1px;color:var(--cream);position:relative;z-index:2}
.stat-tile .sub{font-size:11px;color:var(--muted);margin-top:8px;margin-bottom:0;text-transform:uppercase;letter-spacing:1px;font-weight:700;position:relative;z-index:2}
/* Primary = orange number + subtle gradient bloom in corner */
.stat-tile.primary{border-color:var(--orange);background:radial-gradient(circle at 100% 0%,rgba(255,78,27,.18) 0%,transparent 60%),var(--card)}
.stat-tile.primary .val{color:var(--orange)}
/* Legacy aliases all neutral by default — only primary gets the accent */
.stat-tile.blue .val,
.stat-tile.green .val,
.stat-tile.pink .val,
.stat-tile.purple .val,
.stat-tile.teal .val,
.stat-tile.red .val{color:var(--cream)}
.stat-tile.orange .val,
.stat-tile.volt .val{color:var(--orange)}

/* COUNTDOWN — primary (nearest) gets gradient glow, rest stay neutral */
.countdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:28px 0;position:relative;z-index:2}
.cd-card{background:rgba(26,24,64,.55);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:4px;padding:20px;text-align:center;overflow:hidden}
.cd-card .n{font-size:44px;font-weight:900;line-height:1;font-family:var(--display);font-style:italic;letter-spacing:-2px;color:var(--cream)}
.cd-card .l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-top:8px;font-weight:800;font-family:var(--display)}
.cd-card.june{border-color:var(--orange);background:radial-gradient(circle at 50% 120%,rgba(255,78,27,.22) 0%,transparent 60%),rgba(26,24,64,.55)}
.cd-card.june .n{color:var(--orange)}

/* CHECK / TODO ROWS */
.check-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:2px;background:var(--bg2);border:1px solid var(--border);margin-bottom:6px;transition:all .15s;border-left:3px solid transparent}
.check-row:hover{border-color:var(--border-lt);border-left-color:var(--orange)}
.check-row.done{background:rgba(255,78,27,.08);border-color:rgba(255,78,27,.35);border-left-color:var(--orange)}
.check-row.done .chk-main{text-decoration:line-through;color:var(--muted)}
.chk{appearance:none;width:22px;height:22px;border:2px solid var(--border-lt);border-radius:2px;flex-shrink:0;cursor:pointer;position:relative;transition:all .15s}
.chk:checked{background:var(--orange);border-color:var(--orange)}
.chk:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--cream);font-weight:900;font-size:15px}
.chk-main{font-weight:700;font-size:14px;flex:1;color:var(--cream)}
.chk-meta{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:2px}
.chk-time{font-size:11px;color:var(--muted);font-weight:700;min-width:60px;text-align:right}

/* BUTTONS */
.btn{background:var(--card2);border:1px solid var(--border-lt);color:var(--cream);padding:10px 16px;border-radius:2px;font-size:12px;font-weight:900;transition:all .15s;text-transform:uppercase;letter-spacing:1.2px;font-family:var(--display)}
.btn:hover{background:var(--orange);border-color:var(--orange);color:var(--cream);transform:translateY(-1px);box-shadow:0 4px 14px var(--orange-glow)}
.btn.primary{background:var(--orange);border-color:var(--orange);color:var(--cream)}
.btn.primary:hover{background:var(--orange2)}
.btn.green{background:var(--green);border-color:var(--green);color:var(--bg)}
.btn.orange{background:var(--orange);border-color:var(--orange);color:var(--cream)}
.btn.red{background:var(--red);border-color:var(--red);color:var(--cream)}
.btn.red:hover{background:#e22d20;color:var(--cream)}
.btn.sm{padding:7px 12px;font-size:11px}
.btn.ghost{background:transparent}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* INPUTS */
input[type=text],input[type=number],input[type=date],select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--cream);padding:10px 12px;border-radius:2px;font-size:14px;width:100%;font-weight:600}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 2px rgba(255,78,27,.25)}
label{font-size:10px;color:var(--dim);font-weight:800;text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:5px;font-family:var(--display)}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:12px 14px;background:var(--bg);font-size:10px;font-weight:900;color:var(--orange);text-transform:uppercase;letter-spacing:2px;border-bottom:2px solid var(--orange);font-family:var(--display)}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--cream)}
tr:hover td{background:rgba(255,78,27,.04)}
tr:last-child td{border-bottom:none}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:2px}

/* BADGES — 4 meanings only */
.badge{display:inline-block;padding:4px 10px;border-radius:2px;font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;font-family:var(--display)}
/* orange = action / primary / LIFT  */
.badge.orange,.badge.volt{background:var(--orange);color:var(--cream)}
/* green = status / done / have */
.badge.green{background:transparent;color:var(--green);border:1px solid var(--green)}
/* red = warning */
.badge.red{background:transparent;color:var(--red);border:1px solid var(--red)}
/* neutral = everything else (cardio, rest, info) */
.badge.blue,.badge.purple,.badge.pink,.badge.yellow,.badge.grey,.badge.cream,.badge.indigo{background:transparent;color:var(--dim);border:1px solid var(--border-lt)}

/* PROGRESS BAR */
/* PROGRESS BAR — subtle gradient fill */
.pbar{background:var(--bg2);border:1px solid var(--border);border-radius:0;height:10px;overflow:hidden;margin-top:10px}
.pbar > span{display:block;height:100%;background:linear-gradient(90deg,var(--orange) 0%,var(--blush) 100%);transition:width .4s cubic-bezier(.3,0,.3,1)}
.pbar.green > span,.pbar.orange > span,.pbar.pink > span,.pbar.red > span,.pbar.indigo > span{background:linear-gradient(90deg,var(--orange) 0%,var(--blush) 100%)}

/* WATER DOTS — cream when full, no color variation */
.water-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.drop{width:30px;height:38px;border-radius:0 0 50% 50% / 0 0 40% 40%;border:2px solid var(--border-lt);background:transparent;cursor:pointer;transition:all .15s}
.drop.on{background:var(--cream);border-color:var(--cream)}
.drop:hover:not(.on){border-color:var(--orange)}

/* DAY TOGGLE — orange = active, neutral = inactive */
.day-toggle{display:inline-flex;background:var(--card);border:1px solid var(--border);border-radius:2px;padding:0;margin-bottom:18px;overflow:hidden}
.day-toggle button{background:transparent;border:none;color:var(--dim);padding:10px 20px;border-radius:0;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;font-family:var(--display);transition:all .15s}
.day-toggle button:hover{color:var(--cream)}
.day-toggle button.active{background:var(--orange);color:var(--cream)}

/* SCHEDULE — one accent color, type shown via neutral label */
.sched-item{display:grid;grid-template-columns:90px 1fr;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.sched-item:last-child{border-bottom:none}
.sched-time{font-weight:900;color:var(--cream);font-size:12px;font-family:var(--display);letter-spacing:1px}
.sched-body{font-size:14px}
.sched-body .what{font-weight:900;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-family:var(--display);color:var(--cream)}
.sched-body .detail{color:var(--dim);font-size:13px;font-weight:500}
/* Only EXERCISE rows (the primary action) get the orange time accent */
.sched-item.exercise .sched-time{color:var(--orange)}

/* CALENDAR — orange for primary (lifts), neutral for cardio, faded for rest */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-head{font-size:10px;color:var(--dim);text-align:center;padding:8px 6px;font-weight:900;text-transform:uppercase;letter-spacing:2px;font-family:var(--display)}
.cal-day{aspect-ratio:1;background:var(--bg2);border:1px solid var(--border);border-radius:2px;padding:8px;font-size:11px;position:relative;min-height:70px;transition:border-color .15s}
.cal-day:hover:not(.empty){border-color:var(--border-lt)}
.cal-day .dn{font-weight:900;font-size:18px;font-family:var(--display);font-style:italic;line-height:1;color:var(--cream)}
.cal-day .dt{font-size:9px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.cal-day.empty{opacity:.15;background:transparent;border-style:dashed}
.cal-day.lift{border-left:3px solid var(--orange)}
.cal-day.peloton{border-left:3px solid var(--border-lt)}
.cal-day.rest{opacity:.55}
.cal-day.today{border-color:var(--orange);box-shadow:inset 0 0 0 1px var(--orange)}
.cal-day.today .dn{color:var(--orange)}

/* WORKOUT ROW */
.ex-row{display:grid;grid-template-columns:2fr 70px 90px 1fr;gap:10px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:2px;margin-bottom:6px;align-items:center;font-size:13px}
.ex-name{font-weight:900;font-family:var(--display);text-transform:uppercase;letter-spacing:.5px;font-size:14px;color:var(--cream)}
.ex-row input{padding:7px 9px;font-size:13px}

@media (max-width:720px){
  h1{font-size:28px}
  .hero{padding:24px 18px}
  .ex-row{grid-template-columns:1fr 1fr;gap:6px}
  .ex-row .ex-name{grid-column:1/-1}
  .sched-item{grid-template-columns:1fr}
}

/* TIPS — neutral by default, orange for primary, red for warnings */
.tip{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border-lt);padding:14px 16px;border-radius:2px;margin:10px 0;font-size:14px;font-weight:500;color:var(--cream)}
.tip strong{font-family:var(--display);text-transform:uppercase;letter-spacing:1px;color:var(--cream)}
.tip.warn,.tip.success{border-left-color:var(--orange)}
.tip.warn strong,.tip.success strong{color:var(--orange)}
.tip.danger{border-left-color:var(--red)}
.tip.danger strong{color:var(--red)}

/* PHASE BAR — active phase gets gradient wash, others stay neutral */
.phase-bar{display:grid;grid-template-columns:2fr 1fr 2fr;gap:12px;margin:24px 0}
.phase-bar .phase{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:18px;text-align:center;position:relative;overflow:hidden}
.phase-bar .phase.p1{border:1px solid var(--orange);border-left:3px solid var(--orange);background:radial-gradient(ellipse at 100% 100%,rgba(255,78,27,.14) 0%,transparent 60%),var(--card)}
.phase-bar .phase.p1 .title{color:var(--orange)}
.phase-bar .phase.maui .title,
.phase-bar .phase.p2 .title{color:var(--cream)}
.phase-bar .phase .title{font-weight:900;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-family:var(--display);font-style:italic;font-size:16px}
.phase-bar .phase .dates{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;font-weight:800}
.phase-bar .phase .goal{font-size:12px;color:var(--cream);margin-top:10px;font-weight:500;line-height:1.5}

.kv{display:grid;grid-template-columns:auto 1fr;gap:10px 18px;font-size:13px}
.kv dt{color:var(--orange);font-weight:800;text-transform:uppercase;letter-spacing:1px;font-size:11px;padding-top:2px;font-family:var(--display)}
.kv dd{color:var(--cream);font-weight:500}

.footer{text-align:center;color:var(--muted);font-size:11px;padding:40px 0 20px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.footer em{color:var(--orange);font-style:italic;font-family:var(--display);font-size:14px;letter-spacing:1px;display:block;margin-bottom:16px;font-weight:900}

.data-controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:24px;padding-top:24px;border-top:1px solid var(--border);justify-content:center}

/* MOTTO — gradient orange to blush */
.motto-strip{background:var(--grad-brand);color:var(--cream);padding:12px 20px;margin:20px 0;font-family:var(--display);font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:2px;text-align:center;font-size:15px}

/* QUOTE */
.quote{font-family:var(--display);font-style:italic;font-size:26px;font-weight:900;line-height:1.1;letter-spacing:-1px;text-transform:uppercase;margin:20px 0;padding-left:20px;border-left:3px solid var(--orange);color:var(--cream)}
.quote span{color:var(--orange)}

/* SECTION HEADER */
.sec-head{display:flex;align-items:flex-end;gap:14px;margin-bottom:8px}
.sec-head h1{margin:0}
.sec-head .num{font-family:var(--display);font-size:12px;color:var(--dim);font-weight:800;letter-spacing:3px;padding-bottom:12px}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="logo">BRANDON<span>.FIT</span></div>
    <div class="nav-links" id="navLinks">
      <button class="active" data-s="dashboard">Home</button>
      <button data-s="today">Today</button>
      <button data-s="workouts">Train</button>
      <button data-s="nutrition">Fuel</button>
      <button data-s="supplements">Stack</button>
      <button data-s="schedule">Protocol</button>
      <button data-s="progress">Progress</button>
      <button data-s="plan">8-Week Plan</button>
      <button data-s="bloodwork">Bloodwork</button>
      <button data-s="shopping">Shop</button>
      <button data-s="reference">Playbook</button>
    </div>
  </div>
</nav>
<div class="swoosh-line"></div>
<main>
  <div id="sections"></div>
  <div class="footer">
    <em>"THE ONLY BAD WORKOUT IS THE ONE YOU DIDN'T DO."</em>
    Brandon Kidd · Launch Apr 19, 2026 · 191.8 lbs · 20.9% BF · 144.2 lbs muscle · Target: Birthday Sept 2026
    <div class="data-controls">
      <button class="btn sm" onclick="exportData()">Export Data</button>
      <button class="btn sm" onclick="document.getElementById('importFile').click()">Import Data</button>
      <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
      <button class="btn sm red" onclick="if(confirm('Erase all tracked data? This cannot be undone.')){localStorage.clear();location.reload();}">Reset</button>
    </div>
  </div>
</main>
<script id="app-script">
/* STATE */
const STORE_KEY = "brandon_gameplan_v1";
let state = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
function save(){localStorage.setItem(STORE_KEY, JSON.stringify(state))}
function todayKey(){const d=new Date();return d.toISOString().slice(0,10)}
function ensureDay(k){if(!state.days)state.days={};if(!state.days[k])state.days[k]={supps:{},water:0,protein:0,meals:{},workout:{},notes:"",weight:null};return state.days[k]}
function daysUntil(dateStr){const t=new Date();t.setHours(0,0,0,0);const d=new Date(dateStr);return Math.ceil((d-t)/86400000)}
function fmtDate(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"})}

/* TODAY */
function renderToday(){

    d.dayType = [2,4,6].includes(dow)?"peloton":[1,3,5].includes(dow)?"lifting":"rest";

  const schedule = d.dayType==="lifting"?LIFTING_DAY:PELOTON_DAY;
  const waterDots = 16;
  const drops = Array.from({length:waterDots},(_,i)=>`<div class="drop ${i<(d.water||0)*4?'on':''}" onclick="toggleWater(${i})"></div>`).join("");

    <div class="sec-head"><h1>TODAY</h1><h4 class="num">EXECUTE.</h4></div>

        <div class="sub">40–50G PER MEAL · NON-NEGOTIABLE</div>

/* NAV + WIRING */
const RENDERERS = {
  dashboard: renderDashboard,
  today: renderToday,
  workouts: renderWorkouts,
  nutrition: renderNutrition,
  supplements: renderSupplements,
  schedule: renderSchedule,
  progress: renderProgress,
  plan: renderPlan,
  bloodwork: renderBloodwork,
  shopping: renderShopping,
  reference: renderReference
};

let currentSection = "dashboard";
function renderAll(){
  const el = document.getElementById("sections");
  el.innerHTML = Object.keys(RENDERERS).map(k=>RENDERERS[k]()).join("");
  showSection(currentSection);
}
function showSection(name){
  currentSection = name;
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  const sel = document.getElementById("s-"+name);
  if(sel)sel.classList.add("active");
  document.querySelectorAll("#navLinks button").forEach(b=>b.classList.toggle("active",b.dataset.s===name));
  window.scrollTo({top:0,behavior:"smooth"});
}
function goSection(n){showSection(n);}
document.getElementById("navLinks").addEventListener("click",e=>{
  if(e.target.tagName==="BUTTON")showSection(e.target.dataset.s);
});

/* INTERACTIONS */
function toggleSupp(id){
  const d = ensureDay(todayKey());
  d.supps[id] = !d.supps[id];
  save();renderAll();
}
function toggleWater(i){
  const d = ensureDay(todayKey());
  const filled = Math.round((d.water||0)*4);
  const target = i<filled ? i : i+1;
  d.water = target/4;
  save();renderAll();
}
function addProtein(g){
  const d = ensureDay(todayKey());
  if(g===-999)d.protein=0;
  else d.protein = Math.max(0,(d.protein||0)+g);
  save();renderAll();
}
function setDayType(t){
  const d = ensureDay(todayKey());
  d.dayType = t;save();renderAll();
}
function setWorkoutSel(w){
  const d = ensureDay(todayKey());
  d.workoutSel = w;save();renderAll();
}
function logField(k,v){
  const d = ensureDay(todayKey());
  d[k]=v;save();
}
function logEx(w,i,k,v){
  const d = ensureDay(todayKey());
  if(!d.workout)d.workout={};
  if(!d.workout[w])d.workout[w]={};
  if(!d.workout[w][i])d.workout[w][i]={};
  d.workout[w][i][k]=v;save();
}
function logMeas(cp,k,v){
  if(!state.measurements)state.measurements={};
  if(!state.measurements[cp])state.measurements[cp]={};
  state.measurements[cp][k]=v;save();
}
function logRetest(i,v){
  if(!state.retest)state.retest={};
  state.retest[i]=v;save();
}
function toggleShop(k){
  if(!state.shopping)state.shopping={};
  state.shopping[k]=!state.shopping[k];save();renderAll();
}

function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `brandon-gameplan-${todayKey()}.json`;
  a.click();
}
function importData(e){
  const f = e.target.files[0];
  if(!f)return;
  const r = new FileReader();
  r.onload = ev => {
    try{state = JSON.parse(ev.target.result);save();renderAll();alert("Data imported.");}
    catch(err){alert("Invalid file: "+err.message);}
  };
  r.readAsText(f);
}

/* INIT */
renderAll();
